<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA Space Invaders</title>
  <link rel="stylesheet" href="styles.css?v=14">
</head>
<body>
  <aside class="sidebar">
    <h1>NOVA Squad</h1>
    
    <div class="stat-box">
      <div class="label">Score</div>
      <div class="value score" id="score">0</div>
    </div>
    
    <div class="stat-box">
      <div class="label">Record</div>
      <div class="value highscore" id="highScore">0</div>
    </div>
    
    <div class="stat-box">
      <div class="label">Vies</div>
      <div class="value lives" id="lives">3</div>
    </div>
    
    <div class="stat-box">
      <div class="label">Vague</div>
      <div class="value wave" id="wave">1</div>
    </div>
    
    <div class="stat-box">
      <div class="label">Arme</div>
      <div class="value weapon" id="weapon">—</div>
      <div class="weapon-timer">
        <div class="weapon-timer-bar" id="weaponTimer"></div>
      </div>
    </div>
    
    <div class="stat-box" style="flex: 1;">
      <div class="label">Historique</div>
      <div class="powerups-list" id="powerupLog"></div>
    </div>
    
    <div class="controls-info">
      <div><kbd>←</kbd> <kbd>→</kbd> Déplacer</div>
      <div><kbd>Espace</kbd> Tir</div>
      <div><kbd>P</kbd> Pause</div>
    </div>
  </aside>
  
  <main class="game-area">
    <canvas id="gameCanvas" width="960" height="600"></canvas>
    <button id="pauseButton" class="pause-btn" title="Pause (P)">II</button>
    
    <div class="overlay" id="overlay">
      <h2 id="overlayTitle">VAGUE TERMINÉE</h2>
      <p id="overlayMessage">Défends la station Nova !</p>
      
      <div id="bossTaunt" class="boss-taunt-overlay" style="display: none;">
        <img src="boss_ship.png" class="taunt-portrait" alt="Alien">
        <div class="taunt-dialogue">
          <h3 class="taunt-name">Commandant Alien</h3>
          <p id="tauntText"></p>
        </div>
      </div>
      
      <div id="shipSelection" class="ship-selection">
        <h3 class="ship-sel-title">Choisis ton vaisseau</h3>
        <div class="ships-container">
          <div class="ship-card active" data-ship="nova">
            <img src="ship_vanguard.png" alt="Nova" class="ship-icon">
            <div class="ship-name">Nova</div>
            <div class="ship-stats">Équilibré</div>
          </div>
          <div class="ship-card" data-ship="viper">
            <img src="ship_swift.png" alt="Viper" class="ship-icon">
            <div class="ship-name">Viper</div>
            <div class="ship-stats">Rapide</div>
          </div>
          <div class="ship-card" data-ship="goliath">
            <img src="ship_titan.png" alt="Goliath" class="ship-icon">
            <div class="ship-name">Goliath</div>
            <div class="ship-stats">Résistant</div>
          </div>
          <div class="ship-card" data-ship="phantom">
            <img src="ship_ghost.png" alt="Phantom" class="ship-icon">
            <div class="ship-name">Phantom</div>
            <div class="ship-stats">Furtif</div>
          </div>
          <div class="ship-card" data-ship="orion">
            <img src="ship_orion.png" alt="Orion" class="ship-icon">
            <div class="ship-name">Orion</div>
            <div class="ship-stats">Tactique</div>
          </div>
        </div>
      </div>

      <div id="difficultySelection" class="control-group">
        <label>Difficulté : <span id="diffValueDisplay">Moyen</span></label>
        <input type="range" id="difficultySlider" min="1" max="10" value="5" class="diff-slider">
      </div>

      <div id="waveSelection" class="control-group">
        <label>Vague de départ (1-50) :</label>
        <div class="wave-input-container">
          <input type="number" id="startWaveInput" min="1" max="50" value="1" class="wave-input">
          <span class="sector-hint" id="sectorHint">Secteur 1 : Nova Base</span>
        </div>
      </div>

      <button id="startButton" class="btn-primary">DÉMARRER LA MISSION</button>
    </div>

    <!-- Cutscene Overlay for Transitions -->
    <div id="cutsceneOverlay" class="cutscene-overlay hidden">
      <div class="hyper-jump-stars"></div>
      <img src="ship_vanguard.png" id="cinematicShip" class="cinematic-ship" alt="Ship">
      <div id="cinematicText" class="cinematic-text">Saut en cours...</div>
    </div>
    <!-- Mobile Controls -->
    <div id="mobileControls" class="mobile-controls">
      <div class="move-btns">
        <button id="btnLeft" class="ctrl-btn">←</button>
        <button id="btnRight" class="ctrl-btn">→</button>
      </div>
      <button id="btnFire" class="ctrl-btn fire-btn">FIRE</button>
    </div>
  </main>

  <script src="game.js?v=25"></script>
</body>
</html>
